<style>
/* ====== CSS Reset & Variables ====== */
:root {
  --bg: #1a1a2e; --bg2: #16213e; --panel: #0f3460;
  --gold: #d4a574; --gold2: #e8c9a0; --text: #e0d5c1; --text2: #b8a88a;
  --accent: #c44d4d; --success: #5a9e6f; --magic: #7b5ea7;
  --btn: #2a2a4a; --btn-hover: #3a3a5a; --border: #3a3040;
  --danger: #c0392b; --info: #2980b9;
  --font-xs: 12px; --font-sm: 14px; --font-md: 16px; --font-lg: 18px; --font-xl: 24px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: "Noto Serif SC", "STSong", "SimSun", "KaiTi", serif;
  background: var(--bg); color: var(--text);
  font-size: var(--font-md); line-height: 1.7;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
  display: flex; flex-direction: column; align-items: center;
}
/* ====== Screen Management ====== */
.screen { display:none; width:100%; height:100%; max-width:480px; }
.screen.active { display:flex; flex-direction:column; }

/* ====== Title Screen ====== */
#title-screen {
  align-items:center; justify-content:center;
  background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 40%, #16213e 70%, #0f3460 100%);
  position:relative; overflow:hidden;
}
#title-screen::before {
  content:''; position:absolute; top:0; left:0; right:0; bottom:0;
  background: radial-gradient(ellipse at 50% 30%, rgba(212,165,116,0.15) 0%, transparent 60%),
              radial-gradient(ellipse at 20% 70%, rgba(123,94,167,0.1) 0%, transparent 40%);
}
.title-content { position:relative; z-index:1; text-align:center; padding:20px; }
.title-content h1 {
  font-size:42px; color:var(--gold); letter-spacing:8px;
  text-shadow: 0 0 30px rgba(212,165,116,0.5); margin-bottom:8px;
}
.title-content .subtitle { color:var(--text2); font-size:var(--font-md); margin-bottom:30px; letter-spacing:4px; }
.title-content .ver { color:var(--text2); font-size:var(--font-xs); margin-bottom:20px; }
.title-btn {
  display:block; width:200px; margin:12px auto; padding:14px 0;
  background: linear-gradient(135deg, var(--panel), var(--bg2));
  border:1px solid var(--gold); color:var(--gold);
  font-size:var(--font-lg); border-radius:8px; cursor:pointer;
  letter-spacing:4px; transition:all 0.3s;
}
.title-btn:hover, .title-btn:active { background:var(--gold); color:var(--bg); }
.title-bg-text {
  position:absolute; bottom:20px; width:100%; text-align:center;
  color:rgba(184,168,138,0.3); font-size:var(--font-xs); letter-spacing:2px;
}

/* ====== Character Creation ====== */
#create-screen {
  background:var(--bg); overflow-y:auto; padding:20px;
}
.create-header { text-align:center; margin-bottom:20px; }
.create-header h2 { color:var(--gold); font-size:var(--font-xl); letter-spacing:3px; }
.create-section { margin-bottom:20px; }
.create-section label { display:block; color:var(--gold2); margin-bottom:6px; font-size:var(--font-sm); }
.create-section input, .create-section select {
  width:100%; padding:12px; background:var(--btn); border:1px solid var(--border);
  color:var(--text); font-size:var(--font-md); border-radius:6px; font-family:inherit;
}
.attr-row { display:flex; align-items:center; margin:8px 0; }
.attr-row .attr-name { width:80px; color:var(--gold2); font-size:var(--font-sm); }
.attr-row .attr-desc { width:70px; font-size:var(--font-xs); color:var(--text2); }
.attr-controls { display:flex; align-items:center; gap:8px; flex:1; justify-content:flex-end; }
.attr-controls button {
  width:36px; height:36px; border-radius:50%; border:1px solid var(--gold);
  background:var(--btn); color:var(--gold); font-size:20px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.attr-controls .attr-val { width:30px; text-align:center; color:var(--gold); font-weight:bold; }
.points-remain { text-align:center; color:var(--accent); font-size:var(--font-lg); margin:10px 0; }
.bg-preview {
  background:var(--btn); border:1px solid var(--border); border-radius:8px;
  padding:12px; margin:10px 0; color:var(--text2); font-size:var(--font-sm);
  text-align:center; min-height:60px;
}
.btn-start-game {
  display:block; width:100%; padding:14px; background:var(--gold);
  color:var(--bg); border:none; border-radius:8px; font-size:var(--font-lg);
  cursor:pointer; letter-spacing:4px; font-weight:bold; margin-top:20px;
}
.btn-start-game:disabled { opacity:0.4; cursor:not-allowed; }

/* ====== Main Game Screen ====== */
#game-screen { background:var(--bg); }
.game-scene-img {
  width:100%; height:200px; background:var(--bg2); position:relative; overflow:hidden;
  flex-shrink:0; border-bottom:2px solid var(--border);
}
.game-scene-img img { width:100%; height:100%; object-fit:cover; }
.game-scene-img .no-img {
  width:100%; height:100%; display:flex; align-items:center; justify-content:center;
  font-size:48px; color:var(--text2); opacity:0.5;
}
.game-scene-img .scene-label {
  position:absolute; bottom:8px; left:12px; background:rgba(0,0,0,0.7);
  color:var(--gold); padding:4px 10px; border-radius:4px; font-size:var(--font-xs);
}
.game-text-area {
  flex:1; overflow-y:auto; padding:12px 16px; background:var(--bg);
  scroll-behavior:smooth; -webkit-overflow-scrolling:touch;
}
.game-text-area .msg {
  margin-bottom:10px; padding:8px 12px; border-radius:6px; line-height:1.8;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
.msg.system { background:rgba(15,52,96,0.5); color:var(--text2); font-size:var(--font-sm); }
.msg.story { background:rgba(26,26,46,0.8); color:var(--text); border-left:3px solid var(--gold); }
.msg.success { background:rgba(90,158,111,0.2); color:#8ec99c; border-left:3px solid var(--success); }
.msg.failure { background:rgba(196,77,77,0.2); color:#e09090; border-left:3px solid var(--accent); }
.msg.magic { background:rgba(123,94,167,0.2); color:#b8a0d8; border-left:3px solid var(--magic); }
.msg.choice { background:rgba(212,165,116,0.1); color:var(--gold2); }
/* Bottom Panel */
.game-bottom-panel {
  background:var(--bg2); border-top:2px solid var(--border); flex-shrink:0;
  display:flex; flex-direction:column;
}
/* Quick Stats Bar */
.quick-stats {
  display:flex; justify-content:space-around; padding:6px 8px;
  background:var(--panel); border-bottom:1px solid var(--border);
  font-size:var(--font-xs); color:var(--text2);
}
.quick-stats span { display:flex; align-items:center; gap:2px; }
.quick-stats .stat-val { color:var(--gold); font-weight:bold; }
/* Action Buttons */
.action-row {
  display:flex; gap:6px; padding:8px; flex-wrap:wrap; justify-content:center;
}
.action-btn {
  padding:10px 14px; background:var(--btn); border:1px solid var(--border);
  color:var(--text); border-radius:6px; font-size:var(--font-sm); cursor:pointer;
  white-space:nowrap; transition:all 0.2s; font-family:inherit;
}
.action-btn:active { background:var(--btn-hover); transform:scale(0.95); }
.action-btn.primary { border-color:var(--gold); color:var(--gold); }
.action-btn.danger { border-color:var(--accent); color:var(--accent); }
/* Location Tabs */
.location-tabs {
  display:flex; overflow-x:auto; padding:6px 8px; gap:4px;
  background:var(--bg); border-top:1px solid var(--border);
  -webkit-overflow-scrolling:touch;
}
.location-tab {
  padding:8px 12px; border-radius:20px; background:var(--btn);
  border:1px solid var(--border); color:var(--text2); font-size:var(--font-xs);
  cursor:pointer; white-space:nowrap; flex-shrink:0; font-family:inherit;
}
.location-tab.active { background:var(--panel); border-color:var(--gold); color:var(--gold); }

/* ====== Panels (Inventory, Shop, Save, Settings) ====== */
.overlay {
  display:none; position:fixed; top:0; left:0; right:0; bottom:0; z-index:100;
  background:rgba(0,0,0,0.8); flex-direction:column; align-items:center;
  justify-content:center; padding:20px;
}
.overlay.show { display:flex; }
.overlay-panel {
  width:100%; max-width:460px; max-height:80vh; background:var(--bg2);
  border:2px solid var(--gold); border-radius:12px; padding:16px;
  overflow-y:auto; color:var(--text);
}
.overlay-panel h3 { text-align:center; color:var(--gold); margin-bottom:12px; letter-spacing:3px; }
.overlay-close {
  display:block; margin:12px auto 0; padding:10px 30px; background:var(--accent);

}
.item-card, .save-slot {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px; background:var(--btn); border:1px solid var(--border);
  border-radius:6px; margin:6px 0;
}
.item-card .item-name { color:var(--gold2); font-size:var(--font-sm); }
.item-card .item-info { color:var(--text2); font-size:var(--font-xs); }
.shop-item { cursor:pointer; }
.shop-item:active { background:var(--btn-hover); }
.slot-actions button {

  background:var(--btn); color:var(--text); font-size:var(--font-xs); cursor:pointer;
}
.slot-actions button.save-btn { border-color:var(--success); color:var(--success); }
.slot-actions button.load-btn { border-color:var(--info); color:var(--info); }
.slot-actions button.del-btn { border-color:var(--danger); color:var(--danger); }

/* ====== Choice Buttons ====== */
.choices-container { display:flex; flex-direction:column; gap:6px; margin:8px 0; }
.choice-btn {
  padding:12px; background:rgba(212,165,116,0.08); border:1px solid var(--border);

/* ====== Skill Check Display ====== */
.skill-check { text-align:center; padding:10px; margin:8px 0; border-radius:8px; }
.skill-check.roll-success { background:rgba(90,158,111,0.15); }

/* ====== Scrollbar ====== */
::-webkit-scrollbar { width:4px; }

/* ====== Ending Screen ====== */
#ending-screen {

.ending-title { font-size:var(--font-xl); color:var(--gold); letter-spacing:4px; margin-bottom:16px; }
.ending-text { color:var(--text2); margin-bottom:20px; line-height:2; }
.ending-stats { color:var(--text2); font-size:var(--font-sm); margin-bottom:20px; }

/* ====== Toggle switch ====== */
.toggle-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; }
.toggle-row span { color:var(--text); }
.toggle {
  width:50px; height:26px; background:var(--btn); border-radius:13px; position:relative;
  cursor:pointer; border:1px solid var(--border);
}
.toggle.on { background:var(--success); }
.toggle::after {
  content:''; position:absolute; top:2px; left:2px; width:20px; height:20px;
  background:white; border-radius:50%; transition:all 0.3s;
}
.toggle.on::after { left:26px; }
/* NPC panel */
.npc-card { background:var(--btn); border:1px solid var(--border); border-radius:8px; padding:12px; margin:8px 0; }
.npc-card .npc-name { color:var(--gold); font-weight:bold; }
.npc-card .npc-desc { color:var(--text2); font-size:var(--font-xs); }
.npc-card .aff-bar { height:8px; background:var(--border); border-radius:4px; margin:6px 0; overflow:hidden; }
.npc-card .aff-fill { height:100%; background:linear-gradient(90deg, var(--accent), var(--gold)); border-radius:4px; transition:width 0.5s; }
.npc-actions { display:flex; gap:6px; flex-wrap:wrap; }
.npc-actions button { flex:1; min-width:60px; padding:6px 8px; border-radius:4px; border:1px solid var(--border); background:var(--btn); color:var(--text); font-size:var(--font-xs); cursor:pointer; font-family:inherit; }
/* Collapsible */
.collapsible-header {
  padding:10px 14px; background:var(--btn); border:1px solid var(--border);
  border-radius:6px; cursor:pointer; display:flex; justify-content:space-between; align-items:center;
  margin:4px 0; color:var(--gold2); font-size:var(--font-sm);
}
.collapsible-body { display:none; padding:8px; }
.collapsible-body.open { display:block; }
</style>

<script>
/* ===================================================================
   浮生引 · 红尘与异界 — 高自由度文字叙事养成游戏
   =================================================================== */

// ===================== AUDIO SYSTEM =====================
const AudioSys = {
  initialized: false,
  bgmEnabled: true,
  sfxEnabled: true,
  audioCtx: null,
  init() {
    if (this.initialized) return;
    try {
      this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      this.initialized = true;
    } catch(e) { console.log('Audio not supported'); }
  },
  playTone(freq, dur, type='sine', vol=0.1) {
    if (!this.sfxEnabled || !this.audioCtx) return;
    try {
      const osc = this.audioCtx.createOscillator();
      const gain = this.audioCtx.createGain();
      osc.type = type; osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, this.audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + dur);
      osc.connect(gain); gain.connect(this.audioCtx.destination);
      osc.start(); osc.stop(this.audioCtx.currentTime + dur);
    } catch(e) {}
  },
  click() { this.playTone(800, 0.08, 'square', 0.05); },
  success() { this.playTone(523, 0.1); setTimeout(()=>this.playTone(659, 0.1), 100); setTimeout(()=>this.playTone(784, 0.15), 200); },
  failure() { this.playTone(200, 0.2, 'sawtooth', 0.08); },
  event() { this.playTone(440, 0.08); setTimeout(()=>this.playTone(660, 0.08), 80); setTimeout(()=>this.playTone(880, 0.12), 160); },
  magic() { this.playTone(330, 0.2, 'triangle', 0.08); setTimeout(()=>this.playTone(440, 0.15, 'triangle', 0.06), 150); setTimeout(()=>this.playTone(550, 0.2, 'triangle', 0.07), 300); },
  coin() { this.playTone(1200, 0.05, 'square', 0.06); setTimeout(()=>this.playTone(1400, 0.05, 'square', 0.06), 60); },
};

// ===================== IMAGE GENERATION =====================
// 替换为真实图片生成API时，修改此函数
const ImageGen = {
  cache: {},
  // 模拟图片生成：返回对应场景的占位图
  // 实际接入时改为调用 generateImage(prompt) 并返回URL
  async generate(prompt) {
    // 检查缓存
    const key = prompt.substring(0, 50);
    if (this.cache[key]) return this.cache[key];

    // 模拟延迟
    await new Promise(r => setTimeout(r, 300));

    // 离线场景：返回空字符串，CSS会用渐变背景
    // 如需真实图片，取消下面注释并填入你的API:
    // const response = await fetch('YOUR_IMAGE_API_ENDPOINT', {
    //   method: 'POST',
    //   headers: { 'Content-Type': 'application/json' },
    //   body: JSON.stringify({ prompt, size: '480x200' })
    // });
    // const data = await response.json();
    // return data.url;

    // 使用picsum占位图（需要网络）
    try {
      const seed = prompt.split('').reduce((a,c)=>a+c.charCodeAt(0), 0) % 1000;
      const url = `https://picsum.photos/seed/${seed}/480/200`;
      this.cache[key] = url;
      return url;
    } catch(e) {
      return ''; // 离线时返回空
    }
  }
};

  { id:'end_mystery', name:'秘境之主 · 超越生死', cond:{magic:7, day:100}, desc:'你参透了魔法的终极奥秘，超越了凡人的寿命界限。' },
];

// ===================== GAME STATE =====================
const GameState = {
  // 角色
  name:'', gender:'',
  // 属性
  attrs: { physique:1, intelligence:1, charm:1, luck:1, cunning:1, magic:0, sword:0 },
  // 资源
  gold:20, energy:100, maxEnergy:100,
  // 状态
  day:1, period:0, // 0=清晨,1=上午,2=下午,3=傍晚,4=夜晚
  location:'home',
  // 进度
  transmuteProgress:0, officeUnlocked:false, transmuted:false,
  // 好感
  affections: { qingmei:30, rival:10, mentor:0 },
  // 物品
  inventory: [],
  // 统计
  visitCounts: {},
  // 最后事件
  lastEventId: null,
  // 标记
  flags: {},
  // 当日行动计数
  actionsToday: 0,
  // 临时效果
  tempBuffs: {},
};

function saveGameState() {
  return JSON.parse(JSON.stringify(GameState));
}
function loadGameState(data) {
  Object.assign(GameState, data);
}

// ===================== GAME ENGINE =====================
const Game = {
  init() {
    // 初始化音频（需要用户手势，在第一次点击时触发）
    document.addEventListener('touchstart', ()=>AudioSys.init(), {once:true});
    document.addEventListener('click', ()=>AudioSys.init(), {once:true});
    // 加载存档列表
    this.refreshSaveSlots();
  },

  // ---- Screen Management ----
  showScreen(id) {
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    const el = document.getElementById(id+'-screen');
    if (el) el.classList.add('active');
  },

  showOverlay(html) {
    document.getElementById('overlayPanel').innerHTML = html;
    document.getElementById('overlay').classList.add('show');
  },
  hideOverlay() {
    document.getElementById('overlay').classList.remove('show');
  },

  // ---- Title / New Game ----
  startNew() {
    AudioSys.click();
    this.showScreen('create');
    this.initCreateScreen();
  },

  // ---- Character Creation ----
  initCreateScreen() {
    // 初始化属性分配
    GameState.attrs = { physique:1, intelligence:1, charm:1, luck:1, cunning:1, magic:0, sword:0 };
    GameState.gold = 20; GameState.day = 1; GameState.period = 0;
    GameState.transmuteProgress = 0; GameState.officeUnlocked = false; GameState.transmuted = false;
    GameState.affections = { qingmei:30, rival:10, mentor:0 };
    GameState.inventory = []; GameState.visitCounts = {}; GameState.flags = {};
    GameState.actionsToday = 0; GameState.lastEventId = null; GameState.tempBuffs = {};

    document.getElementById('cname').value = '';
    document.getElementById('cgender').value = '女';
    document.getElementById('bgPreview').textContent = '点击"随机命格"生成你的出身...';
    document.getElementById('btnStart').disabled = false;
    this.renderAttrAlloc();
    this.updatePointsDisplay();
  },

  renderAttrAlloc() {
    const container = document.getElementById('attrAlloc');
    let html = '';
    for (const [key, name] of Object.entries(ATTR_NAMES)) {
      html += `
        <div class="attr-row">
          <span class="attr-name">${ATTR_ICONS[key]} ${name}</span>
          <span class="attr-desc">${this.getAttrDesc(key)}</span>
          <div class="attr-controls">
            <button onclick="Game.adjustAttr('${key}',-1)">−</button>
            <span class="attr-val" id="av_${key}">${GameState.attrs[key]}</span>
            <button onclick="Game.adjustAttr('${key}',1)">+</button>
          </div>
        </div>`;
    }
    container.innerHTML = html;
  },

  getAttrDesc(key) {
    const descs = { physique:'身体力量', intelligence:'学习谋略', charm:'社交魅力', luck:'命运造化', cunning:'心计城府' };
    return descs[key] || '';
  },

  adjustAttr(key, delta) {
    const cur = GameState.attrs[key];
    if (delta > 0 && cur >= 10) return;
    if (delta < 0 && cur <= 1) return;
    const total = Object.values(GameState.attrs).reduce((a,b)=>a+b, 0);
    if (delta > 0 && total >= 15) return; // 初始10点+基础5点=15
    GameState.attrs[key] += delta;
    document.getElementById('av_'+key).textContent = GameState.attrs[key];
    this.updatePointsDisplay();
  },

  updatePointsDisplay() {
    const total = Object.values(GameState.attrs).reduce((a,b)=>a+b, 0);
    const remain = 15 - total;
    document.getElementById('pointsLeft').textContent = remain;
    document.getElementById('btnStart').disabled = remain !== 0;
  },

  randomBackground() {
    AudioSys.click();
    const bgs = [
      '你是江南商贾世家的独子，自小锦衣玉食。父亲希望你读书入仕，光耀门楣。',
      '你出身书香门第，父亲是当地小有名气的教书先生。家中虽不富裕，但藏书颇丰。',
      '你来自没落的武将世家，祖上曾官至将军，如今却只剩一方破旧宅院和一把祖传宝剑。',
      '你是京城一个小官的庶出子女，在家中地位尴尬，处处受到嫡母和嫡兄姐的排挤。',
      '你生在一个平凡的农耕之家，但因天资聪颖被私塾先生看中，破格收为学生。',
      '你是外来商人之后，在这座城市没有根基。但正因如此，你更懂得抓住每一个机会。',
      '你被一个云游道士收养长大，虽然不知亲生父母是谁，但学了一身杂学。',
      '你出身医药世家，从小闻着药香长大。家中在城里开着最大的药铺。',
    ];
    const bg = bgs[Math.floor(Math.random() * bgs.length)];
    document.getElementById('bgPreview').textContent = bg;
  },

  confirmCreate() {
    const name = document.getElementById('cname').value.trim();
    if (name.length < 1 || name.length > 4) { alert('请输入1-4字的姓名'); return; }
    const gender = document.getElementById('cgender').value;
    const total = Object.values(GameState.attrs).reduce((a,b)=>a+b, 0);
    if (total !== 15) { alert('请将所有属性点分配完（剩余0点）'); return; }

    GameState.name = name;
    GameState.gender = gender;
    AudioSys.success();
    this.startGame();
  },

  // ---- Start Main Game ----
  startGame() {
    this.showScreen('game');
    this.updateSceneImage();
    this.updateQuickStats();
    this.updateLocationTabs();
    this.updateActions();
    this.addStoryMsg(`【浮生引】\n\n你叫${GameState.name}，${GameState.gender==='女'?'一位聪慧的姑娘':'一位有志的少年'}。\n\n命运的齿轮开始转动...你的故事从这里开始。`);
    this.addStoryMsg(`📍 当前：${LOCATIONS[GameState.location].name} · 第${GameState.day}天 · ${TIME_PERIODS[GameState.period]}`);
    this.addSystemMsg('选择一个行动开始吧。也可以切换地点探索不同的剧情。');
    // 开局事件
    this.triggerEvent('h1');
  },

  // ---- UI Updates ----
  updateSceneImage() {
    const loc = LOCATIONS[GameState.location];
    const label = document.getElementById('sceneLabel');
    label.textContent = `${loc.name} · ${TIME_PERIODS[GameState.period]}`;
    const img = document.getElementById('sceneImg');

    const prompts = {
      home: `Ancient Chinese courtyard mansion, elegant architecture, ${TIME_PERIODS[GameState.period]} lighting, warm tones`,
      academy: `Ancient Chinese academy, scholars studying, classical buildings, ${TIME_PERIODS[GameState.period]}`,
      market: `Ancient Chinese bustling market street, vendors, colorful stalls, ${TIME_PERIODS[GameState.period]}`,
      office: `Ancient Chinese government office, solemn hall, official documents, ${TIME_PERIODS[GameState.period]}`,
      mystic: `Fantasy magic world, floating islands, magical aura, dragon flying, ${TIME_PERIODS[GameState.period]}`
    };

    const prompt = prompts[GameState.location] || prompts.home;
    // 先设置占位符
    img.src = '';
    img.style.display = 'none';
    let placeholder = document.getElementById('scenePlaceholder');
    if (!placeholder) {
      placeholder = document.createElement('div');
      placeholder.id = 'scenePlaceholder';
      placeholder.className = 'no-img';
      img.parentElement.insertBefore(placeholder, img.nextSibling);
    }
    placeholder.textContent = loc.icon;
    placeholder.style.display = 'flex';
    ImageGen.generate(prompt).then(url => {
      if (url) {
        img.src = url;
        img.onload = ()=>{
          img.style.display = 'block';
          placeholder.style.display = 'none';
        };
        img.onerror = ()=>{
          img.style.display = 'none';
          placeholder.style.display = 'flex';
        };
      }
    }).catch(() => {});
  },

  updateQuickStats() {
    const a = GameState.attrs;
    document.getElementById('quickStats').innerHTML = `
      <span>💰<span class="stat-val">${GameState.gold}</span></span>
      <span>⚡<span class="stat-val">${GameState.energy}</span></span>
      <span>📅<span class="stat-val">${GameState.day}天</span></span>
      <span>🕐<span class="stat-val">${TIME_PERIODS[GameState.period]}</span></span>
      <span>💪${a.physique}</span>
      <span>📖${a.intelligence}</span>
      <span>💐${a.charm}</span>
      <span>🍀${a.luck}</span>
      <span>🕸️${a.cunning}</span>
      ${GameState.transmuted ? `<span>🔮${a.magic||0}</span>` : ''}
    `;
  },

  updateLocationTabs() {
    let html = '';
    for (const [id, loc] of Object.entries(LOCATIONS)) {
      if (loc.unlock) {
        const u = loc.unlock;
        if (u.transmuted && !GameState.transmuted) continue;
        if (u.intelligence && GameState.attrs.intelligence < u.intelligence) continue;
        if (u.day && GameState.day < u.day) continue;
      }
      if (id === 'office' && !GameState.officeUnlocked) {
        if (GameState.attrs.intelligence >= 7 && GameState.day >= 30) {
          GameState.officeUnlocked = true;
        } else continue;
      }
      html += `<button class="location-tab${GameState.location===id?' active':''}" onclick="Game.moveTo('${id}')">${loc.icon} ${loc.name}</button>`;
    }
    document.getElementById('locationTabs').innerHTML = html;
  },

  updateActions() {
    const loc = LOCATIONS[GameState.location];
    let html = '';
    const actions = {
      rest: { label:'休息', icon:'😴', fn:'doRest' },
      study_room: { label:'书阁', icon:'📖', fn:'doStudyRoom' },
      garden: { label:'花园', icon:'🌸', fn:'doGarden' },
      family_hall: { label:'正厅', icon:'🏠', fn:'doFamilyHall' },
      attend_class: { label:'上课', icon:'📚', fn:'doAttendClass' },
      library: { label:'藏书阁', icon:'📚', fn:'doLibrary' },
      debate: { label:'辩论', icon:'🗣️', fn:'doDebate' },
      tea_room: { label:'茶室', icon:'🍵', fn:'doTeaRoom' },
      shop: { label:'商店', icon:'🛒', fn:'openShop' },
      tea_house: { label:'茶馆', icon:'🍵', fn:'doTeaHouse' },
      gamble: { label:'赌坊', icon:'🎲', fn:'doGamble' },
      street_wander: { label:'闲逛', icon:'🚶', fn:'doStreetWander' },
      handle_cases: { label:'审案', icon:'⚖️', fn:'doHandleCases' },
      court_meeting: { label:'上朝', icon:'👑', fn:'doCourtMeeting' },
      bribe: { label:'打点关系', icon:'🎁', fn:'doBribe' },
      review: { label:'查阅卷宗', icon:'📜', fn:'doReview' },
      meditate: { label:'冥想', icon:'🧘', fn:'doMeditate' },
      magic_training: { label:'魔法训练', icon:'🔮', fn:'doMagicTraining' },
      dungeon: { label:'地下城', icon:'⚔️', fn:'doDungeon' },
      summon: { label:'召唤', icon:'✨', fn:'doSummon' },
    };

    for (const aid of loc.actions) {
      if (actions[aid]) {
        const a = actions[aid];
        html += `<button class="action-btn" onclick="Game.${a.fn}()">${a.icon} ${a.label}</button>`;
      }
    }
    // 通用按钮
    html += '<button class="action-btn primary" onclick="Game.openInventory()">🎒 背包</button>';
    html += '<button class="action-btn primary" onclick="Game.openNPCPanel()">💕 人际</button>';
    html += '<button class="action-btn" onclick="Game.showAttributes()">📊 属性</button>';
    html += '<button class="action-btn" onclick="Game.showSaveScreen()">💾 存档</button>';
    html += '<button class="action-btn" onclick="Game.showSettings()">⚙️ 设置</button>';
    document.getElementById('actionRow').innerHTML = html;
  },

  // ---- Move ----
  moveTo(locId) {
    if (GameState.location === locId) return;
    AudioSys.click();
    GameState.location = locId;
    const loc = LOCATIONS[locId];
    this.updateSceneImage();
    this.updateLocationTabs();
    this.updateActions();
    this.addSystemMsg(`你来到了【${loc.name}】。${loc.desc}`);
    // 统计
    GameState.visitCounts[locId] = (GameState.visitCounts[locId] || 0) + 1;
    // 随机事件
    if (Math.random() < 0.4) {
      this.triggerRandomEvent(locId);
    }
  },

  // ---- Message helpers ----
  addMsg(text, cls='story') {
    const area = document.getElementById('gameText');
    const div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.textContent = text;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  },
  addStoryMsg(text) { this.addMsg(text, 'story'); },
  addSystemMsg(text) { this.addMsg(text, 'system'); },
  addSuccessMsg(text) { this.addMsg(text, 'success'); },
  addFailureMsg(text) { this.addMsg(text, 'failure'); },
  addMagicMsg(text) { this.addMsg(text, 'magic'); },

  // ---- Skill Check (D20) ----
  skillCheck(attr, dc) {
    const roll = Math.floor(Math.random() * 20) + 1;
    const bonus = GameState.attrs[attr] || 0;
    const total = roll + bonus;
    const success = total >= dc;
    const resultText = `🎲 检定：掷出${roll} + ${ATTR_NAMES[attr]}(${bonus}) = ${total} (需≥${dc}) → ${success?'✅ 成功':'❌ 失败'}`;
    return { success, roll, bonus, total, dc, text: resultText };
  },

  // ---- Apply effects ----
  applyEffects(effects) {
    if (!effects) return;
    if (effects.attrChange) {
      for (const [k,v] of Object.entries(effects.attrChange)) {
        if (GameState.attrs[k] !== undefined) {
          GameState.attrs[k] = Math.max(0, Math.min(10, GameState.attrs[k] + v));
        }
      }
    }
    if (effects.gold) GameState.gold += effects.gold;
    if (effects.item) this.addItem(effects.item);
    if (effects.affection) {
      for (const [k,v] of Object.entries(effects.affection)) {
        if (GameState.affections[k] !== undefined) {
          GameState.affections[k] = Math.max(0, Math.min(100, GameState.affections[k] + v));
        }
      }
    }
    if (effects.transmuteProgress) {
      GameState.transmuteProgress += effects.transmuteProgress;
    }
    if (effects.energy) GameState.energy = Math.max(0, Math.min(GameState.maxEnergy, GameState.energy + effects.energy));
  },

  // ---- Item management ----
  addItem(itemId) {
    const item = ITEM_DB[itemId];
    if (!item) return;
    const existing = GameState.inventory.find(i=>i.id===itemId);
    if (existing && item.type==='consumable') {
      existing.qty = (existing.qty||1)+1;
    } else {
      GameState.inventory.push({...item, qty:1});
    }
  },
  removeItem(itemId) {
    const idx = GameState.inventory.findIndex(i=>i.id===itemId);
    if (idx>=0) {
      const item = GameState.inventory[idx];
      if (item.qty > 1) { item.qty--; }
      else { GameState.inventory.splice(idx,1); }
    }
  },

  // ---- Advance time ----
  advanceTime(actions=1) {
    GameState.actionsToday += actions;
    if (GameState.actionsToday >= 4) {
      GameState.actionsToday = 0;
      GameState.period++;
      if (GameState.period >= 5) {
        GameState.period = 0;
        GameState.day++;
        this.addSystemMsg(`🌅 新的一天开始 — 第${GameState.day}天`);
        // 每日恢复
        GameState.energy = Math.min(GameState.maxEnergy, GameState.energy + 15);
        // 清除临时buff
        GameState.tempBuffs = {};
        // 每日随机事件
        if (Math.random() < 0.5) {
          this.triggerRandomEvent('any');
        }
        // 检查结局
        this.checkEndings();
      }
      this.updateSceneImage();
    }
    this.updateQuickStats();
    this.updateLocationTabs();
  },

  // ---- Random Events ----
  triggerRandomEvent(location) {
    const candidates = RANDOM_EVENTS.filter(e=>{
      if (e.isTransmuteTrigger) return false; // 穿越事件单独触发
      if (e.location !== location && e.location !== 'any') return false;
      if (e.period !== 'any' && e.period !== TIME_PERIODS[GameState.period]) return false;
      if (e.id === GameState.lastEventId) return false; // 避免重复
      if (e.requireTransmigration && !GameState.transmuted) return false;
      return true;
    });
    if (candidates.length === 0) return;
    // 特殊事件权重提升
    const specials = candidates.filter(e=>e.isSpecial);
    const pool = specials.length > 0 && Math.random() < 0.3 ? specials : candidates;
    const event = pool[Math.floor(Math.random() * pool.length)];
    GameState.lastEventId = event.id;
    this.triggerEvent(event.id);
  },

  triggerEvent(eventId) {
    const event = RANDOM_EVENTS.find(e=>e.id===eventId);
    if (!event) return;
    AudioSys.event();
    this.addSystemMsg(`✨ 事件：${event.title}`);
    this.addStoryMsg(event.text);

    if (event.choices) {
      const container = document.createElement('div');
      container.className = 'choices-container';
      event.choices.forEach((ch, idx) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = `${idx+1}. ${ch.text}`;
        btn.onclick = ()=>{
          AudioSys.click();
          container.remove();
          this.resolveChoice(event, ch);
        };
        container.appendChild(btn);
      });
      document.getElementById('gameText').appendChild(container);
      document.getElementById('gameText').scrollTop = document.getElementById('gameText').scrollHeight;
    }
  },

  resolveChoice(event, choice) {
    if (choice.msg === 'TRANSMUTE') {
      this.doTransmute();
      return;
    }
    // 检查花费
    if (choice.cost && GameState.gold < choice.cost) {
      this.addFailureMsg('银两不够！');
      return;
    }
    // 技能检定
    if (choice.check) {
      const result = this.skillCheck(choice.check.attr, choice.check.dc);
      this.addSystemMsg(result.text);
      if (result.success) {
        AudioSys.success();
        if (choice.success) {
          this.addSuccessMsg(choice.success.msg);
          this.applyEffects(choice.success);
        }
      } else {
        AudioSys.failure();
        if (choice.failure) {
          this.addFailureMsg(choice.failure.msg);
          this.applyEffects(choice.failure);
        }
      }
    } else if (choice.msg) {
      this.addStoryMsg(choice.msg);
      this.applyEffects(choice);
    } else if (choice.success && !choice.check) {
      this.addSuccessMsg(choice.success.msg);
      this.applyEffects(choice.success);
    }
    this.advanceTime();
    this.updateQuickStats();
    this.updateActions();
    this.updateLocationTabs();
    // 检查穿越触发
    this.checkTransmuteTrigger();
  },

  // ---- Transmute check ----
  checkTransmuteTrigger() {
    if (GameState.transmuted) return;
    if (GameState.transmuteProgress >= 8) {
      // 触发穿越事件
      const event = RANDOM_EVENTS.find(e=>e.isTransmuteTrigger);
      if (event) {
        this.triggerEvent(event.id);
      }
    }
  },

  doTransmute() {
    GameState.transmuted = true;
    GameState.attrs.magic = GameState.attrs.intelligence; // 智力转换为基础魔力
    GameState.attrs.sword = GameState.attrs.physique; // 体质转换为剑术基础
    GameState.affections.mentor = 20;
    GameState.location = 'mystic';
    AudioSys.magic();
    this.addMagicMsg('══════════════════════════');
    this.addMagicMsg('⚡ 你踏入了异界之门！');
    this.addMagicMsg('世界的法则在你眼前重组...');
    this.addMagicMsg('你来到了剑与魔法的世界——艾泽拉斯大陆！');
    this.addMagicMsg('墨渊已在传送门另一端等候你。');
    this.addMagicMsg(`你的智力(${GameState.attrs.intelligence})转化为魔法理解(${GameState.attrs.magic})`);
    this.addMagicMsg(`你的体质(${GameState.attrs.physique})转化为剑术基础(${GameState.attrs.sword})`);
    this.addMagicMsg('══════════════════════════');
    this.updateSceneImage();
    this.updateQuickStats();
    this.updateLocationTabs();
    this.updateActions();
    this.advanceTime();
    // 开启异界章节
    setTimeout(()=>{
      this.triggerEvent('t1');
    }, 1000);
  },

  // ---- Location Actions ----
  doRest() {
    this.addStoryMsg('你在家中休息，恢复了精力。');
    GameState.energy = Math.min(GameState.maxEnergy, GameState.energy + 25);
    this.advanceTime();
    this.updateQuickStats();
  },
  doStudyRoom() {
    this.addStoryMsg('你来到家中书阁，翻阅古籍。');
    if (Math.random() < 0.3) this.triggerRandomEvent('home');
    else {
      this.addStoryMsg('你安安静静地读了一会儿书，感觉有所收获。(智力+1)');
      GameState.attrs.intelligence = Math.min(10, GameState.attrs.intelligence+1);
    }
    this.advanceTime();
    this.updateQuickStats();
  },
  doGarden() {
    this.addStoryMsg('你在花园中漫步，花香扑鼻。');
    const r = Math.random();
    if (r < 0.3) this.triggerRandomEvent('home');
    else if (r < 0.6) {
      this.addStoryMsg('苏念雪也在花园中赏花，你们聊了一会儿。(苏念雪好感+5)');
      GameState.affections.qingmei = Math.min(100, GameState.affections.qingmei+5);
    } else {

  // ---- Inventory ----
  openInventory() {
    AudioSys.click();
    const inv = GameState.inventory;
    let html = `<h3>🎒 背包</h3>`;
    if (inv.length === 0) {
      html += '<p style="text-align:center;color:var(--text2);">空空如也...</p>';
    } else {
      inv.forEach((item, idx) => {
        html += `
        <div class="item-card">
          <div>
            <div class="item-name">${item.name} ${item.qty>1?`×${item.qty}`:''}</div>
            <div class="item-info">${item.desc}</div>
          </div>
          <button class="action-btn" style="font-size:12px;padding:6px 8px;" onclick="Game.useItem(${idx})">使用</button>
        </div>`;
      });
    }
    html += `<button class="overlay-close" onclick="Game.hideOverlay()">关闭</button>`;
    this.showOverlay(html);
  },
  useItem(idx) {
    const item = GameState.inventory[idx];
    if (!item) return;
    AudioSys.click();
    if (item.type === 'consumable') {
      if (item.heal) { GameState.energy = Math.min(GameState.maxEnergy, GameState.energy + item.heal); this.addSystemMsg(`使用了${item.name}，恢复${item.heal}点体力。`); }
      if (item.tempBuff) { Object.assign(GameState.tempBuffs, item.tempBuff); this.addSystemMsg(`使用了${item.name}，临时属性提升！`); }
      this.removeItem(item.id);
    } else if (item.type === 'gift') {
      // 礼物从NPC面板送出
      this.hideOverlay();
      this.addSystemMsg('💡 请通过【人际】面板选择送礼对象。');
    } else {
      this.addSystemMsg(`${item.name}无法直接使用。`);
    }
    this.hideOverlay();
    this.updateQuickStats();
  },

  // ---- Save / Load ----
  showSaveScreen() {
    AudioSys.click();
    this.showSaveLoadUI('save');
  },
  showLoadScreen() {
    AudioSys.click();
    this.showSaveLoadUI('load');
  },
  showSaveLoadUI(mode) {
    let html = `<h3>${mode==='save'?'💾 存档':'📂 读档'}</h3>`;
    for (let i = 0; i < 3; i++) {
      const data = localStorage.getItem(`fushengyin_save_${i}`);
      let info = '空';
      if (data) {
        try {
          const d = JSON.parse(data);
          const locName = LOCATIONS[d.location] ? LOCATIONS[d.location].name : '未知';
          info = `${d.name} · ${locName} · 第${d.day}天 · 💰${d.gold}两${d.transmuted?' 🔮':''}`;
        } catch(e) { info = '存档损坏'; }
      }
      html += `
        <div class="item-card save-slot">
          <div>
            <div class="item-name">存档位 ${i+1}</div>
            <div class="item-info">${info}</div>
          </div>
          <div class="slot-actions">
            <button class="save-btn" onclick="Game.saveSlot(${i})">💾</button>
            <button class="load-btn" onclick="Game.loadSlot(${i})">📂</button>
            <button class="del-btn" onclick="Game.deleteSlot(${i})">🗑️</button>
          </div>
        </div>`;
    }
    html += `<p style="color:var(--text2);font-size:var(--font-xs);text-align:center;margin-top:8px;">游戏也会在每个时段自动保存到临时档</p>`;
    html += `<button class="overlay-close" onclick="Game.hideOverlay()">关闭</button>`;
    this.showOverlay(html);
  },
  saveSlot(i) {
    const data = JSON.stringify(saveGameState());
    localStorage.setItem(`fushengyin_save_${i}`, data);
    AudioSys.success();
    this.hideOverlay();
    this.addSystemMsg(`💾 存档到位置 ${i+1} 成功！`);
  },
  loadSlot(i) {
    const data = localStorage.getItem(`fushengyin_save_${i}`);
    if (!data) { alert('该存档位为空'); return; }
    try {
      const state = JSON.parse(data);
      loadGameState(state);
      AudioSys.success();
      this.hideOverlay();
      this.showScreen('game');
      this.updateSceneImage();
      this.updateQuickStats();
      this.updateLocationTabs();
      this.updateActions();
      document.getElementById('gameText').innerHTML = '';
      this.addSystemMsg(`📂 从存档位 ${i+1} 读取成功！欢迎回来，${GameState.name}。`);
    } catch(e) {
      alert('存档读取失败：' + e.message);
    }
  },
  deleteSlot(i) {
    if (confirm('确定删除这个存档吗？')) {
      localStorage.removeItem(`fushengyin_save_${i}`);
      this.showSaveLoadUI('save');
    }
  },
  refreshSaveSlots() {
    // 检查存档状态
  },
  autoSave() {
    const data = JSON.stringify(saveGameState());
    localStorage.setItem('fushengyin_autosave', data);
  },

  // ---- Settings ----
  showSettings() {
    AudioSys.click();
    let html = `<h3>⚙️ 游戏设置</h3>`;
    html += `<div class="toggle-row"><span>🔊 音效</span><div class="toggle${AudioSys.sfxEnabled?' on':''}" onclick="Game.toggleSfx(this)"></div></div>`;
    html += `<div class="toggle-row"><span>🎵 背景音乐提示音</span><div class="toggle${AudioSys.bgmEnabled?' on':''}" onclick="Game.toggleBgm(this)"></div></div>`;
    html += `<hr style="border-color:var(--border);margin:12px 0;">`;
    html += `<p style="font-size:var(--font-xs);color:var(--text2);text-align:center;">浮生引 v1.0 · 高自由度叙事养成<br>存档于 LocalStorage · 建议定期手动存档</p>`;
    html += `<button class="overlay-close" onclick="Game.hideOverlay()">关闭</button>`;
    this.showOverlay(html);
  },
  toggleSfx(el) {
    AudioSys.sfxEnabled = !AudioSys.sfxEnabled;
    el.classList.toggle('on', AudioSys.sfxEnabled);
    if (AudioSys.sfxEnabled) AudioSys.click();
  },
  toggleBgm(el) {
    AudioSys.bgmEnabled = !AudioSys.bgmEnabled;
    el.classList.toggle('on', AudioSys.bgmEnabled);
  },

  // ---- Endings ----
  checkEndings() {
    const a = GameState.attrs;
    const af = GameState.affections;
    const vc = GameState.visitCounts;

    for (const ending of ENDINGS) {
      const c = ending.cond;
      let met = true;
      if (c.intelligence && a.intelligence < c.intelligence) met = false;
      if (c.cunning && a.cunning < c.cunning) met = false;
      if (c.charm && a.charm < c.charm) met = false;
      if (c.physique && a.physique < c.physique) met = false;
      if (c.luck && a.luck < c.luck) met = false;
      if (c.magic && (a.magic||0) < c.magic) met = false;
      if (c.sword && (a.sword||0) < c.sword) met = false;
      if (c.day && GameState.day < c.day) met = false;
      if (c.gold && GameState.gold < c.gold) met = false;
      if (c.transmuted && !GameState.transmuted) met = false;
      if (c.affection_qingmei && af.qingmei < c.affection_qingmei) met = false;
      if (c.affection_rival && af.rival < c.affection_rival) met = false;
      if (c.office_visits && (vc['office']||0) < c.office_visits) met = false;
      if (c.home_visits && (vc['home']||0) < c.home_visits) met = false;

      if (met) {
        this.showEnding(ending);
        return;
      }
    }
  },
  showEnding(ending) {
    AudioSys.magic();
    this.showScreen('ending');
    document.getElementById('endingTitle').textContent = ending.name;
    document.getElementById('endingText').textContent = ending.desc;
    document.getElementById('endingStats').innerHTML = `
      ${GameState.name} · 第${GameState.day}天 · 💰${GameState.gold}两<br>
      体质${GameState.attrs.physique} 智力${GameState.attrs.intelligence} 魅力${GameState.attrs.charm} 运气${GameState.attrs.luck} 心计${GameState.attrs.cunning}<br>
      ${GameState.transmuted ? `魔法${GameState.attrs.magic||0} 剑术${GameState.attrs.sword||0}` : ''}
    `;
  },
  returnToTitle() {
    AudioSys.click();
    this.showScreen('title');
  },
};

// ===================== NPC INTERACTION SYSTEM =====================
Game.openNPCPanel = function() {
  AudioSys.click();
  let html = `<h3>💕 人际往来</h3>`;
  for (const [npcId, npc] of Object.entries(NPC_DB)) {
    if (npcId === 'mentor' && !GameState.transmuted) continue;
    if (npcId !== 'mentor' && GameState.transmuted && npc.location !== 'mystic') {
      // 穿越后原世界NPC通过"通信"互动
    }
    const aff = GameState.affections[npcId] || 0;
    const level = aff >= 80 ? '❤️ 挚友/恋人' : aff >= 60 ? '💛 好友' : aff >= 40 ? '🤝 熟识' : aff >= 20 ? '👋 初识' : '😶 陌生';
    let dialogueList = npc.dialogues.low;
    if (aff >= 80) dialogueList = npc.dialogues.high;
    else if (aff >= 50) dialogueList = npc.dialogues.mid;
    const dialogue = dialogueList[Math.floor(Math.random() * dialogueList.length)];

    html += `
    <div class="npc-card">
      <div class="npc-name">${npc.name} <span style="font-size:var(--font-xs);color:var(--text2);">${npc.title}</span></div>
      <div class="npc-desc">${npc.desc}</div>
      <div class="aff-bar"><div class="aff-fill" style="width:${aff}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:var(--font-xs);color:var(--text2);">
        <span>好感度：${aff}/100 ${level}</span>
      </div>
      <p style="color:var(--text2);font-size:var(--font-xs);margin:6px 0;font-style:italic;">${dialogue}</p>
      <div class="npc-actions">
        <button onclick="Game.talkToNPC('${npcId}')">💬 交谈</button>
        <button onclick="Game.giveGiftToNPC('${npcId}')">🎁 送礼</button>
        ${npcId === 'qingmei' && aff >= 70 ? '<button onclick="Game.npcSpecial(\''+npcId+'\')">💕 告白</button>' : ''}
        ${npcId === 'rival' && aff >= 60 ? '<button onclick="Game.npcSpecial(\''+npcId+'\')">🍻 结义</button>' : ''}
        ${npcId === 'mentor' && aff >= 70 ? '<button onclick="Game.npcSpecial(\''+npcId+'\')">🔮 拜师</button>' : ''}
      </div>
    </div>`;
  }
  if (GameState.transmuted) {
    html += `<div class="npc-card" style="border-color:var(--magic);">
      <div class="npc-name" style="color:var(--magic);">📮 跨时空通信</div>
      <div class="npc-desc">通过魔法水晶球，你可以与故乡的人通信。</div>
      <button class="action-btn" onclick="Game.crossWorldTalk()" style="width:100%;margin-top:8px;">📡 与苏念雪通信 (+好感)</button>
    </div>`;
  }
  html += `<button class="overlay-close" onclick="Game.hideOverlay()">关闭</button>`;
  this.showOverlay(html);
};

Game.talkToNPC = function(npcId) {
  const npc = NPC_DB[npcId];
  const aff = GameState.affections[npcId] || 0;
  let dialogueList = npc.dialogues.low;
  if (aff >= 80) dialogueList = npc.dialogues.high;
  else if (aff >= 50) dialogueList = npc.dialogues.mid;
  const dialogue = dialogueList[Math.floor(Math.random() * dialogueList.length)];

  this.hideOverlay();
  this.addStoryMsg(`【与${npc.name}交谈】`);
  this.addStoryMsg(dialogue);
  // 小概率好感提升
  if (Math.random() < 0.4) {
    const gain = Math.floor(Math.random() * 5) + 3;
    GameState.affections[npcId] = Math.min(100, (GameState.affections[npcId]||0) + gain);
    this.addSuccessMsg(`(好感+${gain})`);
  }
  this.advanceTime();
  this.updateQuickStats();
};

Game.giveGiftToNPC = function(npcId) {
  this.hideOverlay();
  const gifts = GameState.inventory.filter(i=>i.type==='gift');
  if (gifts.length === 0) {
    this.addSystemMsg('你没有可送的礼物。去市集商店买一些吧。');
    return;
  }
  let html = `<h3>🎁 选择礼物送给${NPC_DB[npcId].name}</h3>`;
  gifts.forEach((item, idx) => {
    const realIdx = GameState.inventory.indexOf(item);
    html += `<button class="choice-btn" onclick="Game.doGiveGift(${realIdx},'${npcId}')">${item.name} (好感+${item.affection||10})</button>`;
  });
  html += `<button class="overlay-close" onclick="Game.openNPCPanel()">返回</button>`;
  this.showOverlay(html);
};

Game.doGiveGift = function(idx, npcId) {
  const item = GameState.inventory[idx];
  if (!item) return;
  const affBonus = item.affection || 10;
  GameState.affections[npcId] = Math.min(100, (GameState.affections[npcId]||0) + affBonus);
  this.removeItem(item.id);
  this.hideOverlay();
  this.addStoryMsg(`你将${item.name}送给了${NPC_DB[npcId].name}。(好感+${affBonus})`);
  this.updateQuickStats();
};

Game.npcSpecial = function(npcId) {
  this.hideOverlay();
  if (npcId === 'qingmei') {
    this.addStoryMsg('💕 你在月下向苏念雪表明了心意...');
    this.addStoryMsg('她泪眼婆娑，轻轻点头。"我等你这句话...等了很久很久。"');
    this.addSuccessMsg('❤️ 苏念雪成为了你的恋人！结局线已改变。');
    GameState.flags.lover = 'qingmei';
    GameState.affections.qingmei = 100;
  } else if (npcId === 'rival') {
    this.addStoryMsg('🍻 你与萧景琰在酒楼上对饮三杯，从此兄弟相称。');
    this.addStoryMsg('"从今日起，你我便是异姓兄弟。朝堂之上，共同进退！"');
    GameState.flags.brother = 'rival';
    GameState.affections.rival = 100;
  } else if (npcId === 'mentor') {
    this.addStoryMsg('🔮 你单膝跪地，正式拜入墨渊门下。');
    this.addStoryMsg('墨渊难得露出了笑容。"好徒儿，从今日起，你便是我的真传弟子。"');
    GameState.flags.apprentice = true;
    GameState.affections.mentor = 100;
    GameState.attrs.magic = Math.min(10, (GameState.attrs.magic||0) + 2);
  }
  this.updateQuickStats();
};

Game.crossWorldTalk = function() {
  this.hideOverlay();
  this.addMagicMsg('📡 你通过水晶球联系上了苏念雪...');
  this.addStoryMsg('水晶球中浮现出苏念雪的影像。她看起来有些憔悴，但看到你的瞬间眼睛亮了。"你...你在那边还好吗？"');
  GameState.affections.qingmei = Math.min(100, (GameState.affections.qingmei||0) + 5);
  this.addSuccessMsg('虽然分隔两界，但心与心的联系从未断过。(苏念雪好感+5)');
  this.advanceTime();
  this.updateQuickStats();
};

// ===================== ATTRIBUTE DETAIL PANEL =====================
Game.showAttributes = function() {
  AudioSys.click();
  let html = `<h3>📊 ${GameState.name} · 属性详情</h3>`;
  for (const [key, name] of Object.entries(ATTR_NAMES)) {
    const val = GameState.attrs[key] || 0;
    html += `
    <div style="margin:8px 0;">
      <div style="display:flex;justify-content:space-between;color:var(--text);font-size:var(--font-sm);">
        <span>${ATTR_ICONS[key]} ${name}</span>
        <span style="color:var(--gold);">${val}/10</span>
      </div>
      <div class="aff-bar"><div class="aff-fill" style="width:${val*10}%"></div></div>
    </div>`;
  }
  if (GameState.transmuted) {
    html += `<hr style="border-color:var(--border);margin:10px 0;">`;
    html += `<div style="color:var(--magic);">🔮 魔法等级：${GameState.attrs.magic||0}/10</div>`;
    html += `<div style="color:var(--magic);">⚔️ 剑术等级：${GameState.attrs.sword||0}/10</div>`;
  }
  html += `<p style="color:var(--text2);font-size:var(--font-xs);margin-top:6px;">💡 穿越进度：${GameState.transmuteProgress}/8 ${GameState.transmuteProgress>=8?'✨ 可以触发穿越！':''}</p>`;
  html += `<button class="overlay-close" onclick="Game.hideOverlay()">关闭</button>`;
  this.showOverlay(html);
};

// ===== 初始化 =====
window.addEventListener('DOMContentLoaded', ()=>{
  Game.init();
  // 注册 Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
  // 关闭overlay的点击事件
  document.getElementById('overlay').addEventListener('click', function(e) {
    if (e.target === this) Game.hideOverlay();
  });
  // 自动存档定时器
  setInterval(()=>{
    if (document.getElementById('game-screen').classList.contains('active')) {
      Game.autoSave();
    }
  }, 30000); // 每30秒自动存档
});
